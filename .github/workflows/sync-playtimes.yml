name: Sync Playtimes

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9 # Você pode especificar a versão que preferir

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm # O cache agora aponta para o pnpm

      - run: pnpm install

      # O playwright ainda pode ser chamado via npx ou pnpm dlx
      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm run sync:headless
        env:
          TZ: America/Sao_Paulo
          BACKLOGGD_EMAIL: ${{ secrets.BACKLOGGD_EMAIL }}
          BACKLOGGD_PWD: ${{ secrets.BACKLOGGD_PWD }}
          PS_TIMETRACKER_CODE: ${{ secrets.PS_TIMETRACKER_CODE }}
          PS_TIMETRACKER_PSN_NAME: ${{ secrets.PS_TIMETRACKER_PSN_NAME }}
          BACKLOGGD_STORAGE_STATE_PATH: storage/backloggd-state.json
          SYNC_SUMMARY_PATH: storage/sync-summary.json
          HEADLESS: 'true'
          SYNC_REFERENCE_DAYS_OFFSET: '-1'

      - name: Build success email body
        if: success() && hashFiles('storage/sync-summary.json') != ''
        run: pnpm exec tsx scripts/generate-email.ts
        env:
          SYNC_SUMMARY_PATH: storage/sync-summary.json
          EMAIL_OUTPUT_PATH: storage/email-body.html

      - name: Send success email
        if: success() && hashFiles('storage/email-body.html') != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Auto Game Sync - Job concluido com sucesso
          to: ${{ secrets.SYNC_EMAIL_TO }}
          from: ${{ secrets.SYNC_EMAIL_FROM }}
          html_body: file://storage/email-body.html
