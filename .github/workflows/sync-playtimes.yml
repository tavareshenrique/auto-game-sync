name: Sync Playtimes

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9 # Você pode especificar a versão que preferir

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm # O cache agora aponta para o pnpm

      - run: pnpm install
      
      # O playwright ainda pode ser chamado via npx ou pnpm dlx
      - run: pnpm exec playwright install --with-deps chromium
      
      - run: pnpm run sync:headless
        env:
          BACKLOGGD_EMAIL: ${{ secrets.BACKLOGGD_EMAIL }}
          BACKLOGGD_PWD: ${{ secrets.BACKLOGGD_PWD }}
          PS_TIMETRACKER_CODE: ${{ secrets.PS_TIMETRACKER_CODE }}
          PS_TIMETRACKER_PSN_NAME: ${{ secrets.PS_TIMETRACKER_PSN_NAME }}
          BACKLOGGD_STORAGE_STATE_PATH: storage/backloggd-state.json
          SYNC_SUMMARY_PATH: storage/sync-summary.json
          HEADLESS: 'true'
          SYNC_REFERENCE_DAYS_OFFSET: '-1'

      - name: Build success email body
        if: success()
        id: build-email-body
        env:
          SYNC_SUMMARY_PATH: storage/sync-summary.json
        run: |
          node --input-type=module <<'EOF'
          import { appendFileSync, readFileSync } from 'node:fs';

          const summaryPath = process.env.SYNC_SUMMARY_PATH;
          if (!summaryPath) {
            throw new Error('Missing SYNC_SUMMARY_PATH');
          }

          const raw = readFileSync(summaryPath, 'utf8');
          const summary = JSON.parse(raw);
          const games = Array.isArray(summary.games) ? summary.games : [];

          const lines = [];
          lines.push('Sincronizacao concluida com sucesso.');
          lines.push('');

          if (games.length === 0) {
            lines.push('Nenhum jogo sincronizado neste dia.');
          } else {
            for (const game of games) {
              lines.push(`Nome do Jogo: ${game.title}`);
              lines.push(`Tempo Jogado: ${game.playedTime}`);
              lines.push(`Dia Cadastrado: ${game.registeredDay}`);
              lines.push('');
            }
          }

          const body = lines.join('\n').trimEnd();
          appendFileSync(process.env.GITHUB_OUTPUT, `body<<EOF\n${body}\nEOF\n`);
          EOF

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Auto Game Sync - Job concluido com sucesso
          to: ${{ secrets.SYNC_EMAIL_TO }}
          from: ${{ secrets.SYNC_EMAIL_FROM }}
          body: ${{ steps.build-email-body.outputs.body }}